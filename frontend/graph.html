<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转到后端知识图谱</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: #f6f7f9;
            color: #1f2937;
        }
        main {
            max-width: 520px;
            padding: 24px;
            text-align: center;
            line-height: 1.7;
        }
        a {
            color: #2563eb;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>正在打开后端知识图谱</h1>
        <p>知识图谱统一使用后端管理页，避免前端重复渲染。</p>
        <p><a id="target-link" href="#">打开后端知识图谱</a></p>
    </main>
    <script src="env-config.js?v=15" charset="UTF-8"></script>
    <script>
        function normalizeBaseUrl(value, fallback) {
            return (value || fallback).replace(/\/+$/, '');
        }
        const config = window.__APP_CONFIG__ || {};
        const target = `${normalizeBaseUrl(config.backendAdminBaseUrl, 'http://localhost:8080')}/admin`;
        document.getElementById('target-link').href = target;
        window.location.replace(target);
    </script>
</body>
</html>
